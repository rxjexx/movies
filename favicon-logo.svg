<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .logo-bg { fill: #1a1a1a; }
        .logo-icon { fill: #fff; }
      }
      @media (prefers-color-scheme: light) {
        .logo-bg { fill: #f5f5f5; }
        .logo-icon { fill: #000; }
      }
    </style>
  </defs>
  <rect class="logo-bg" width="100" height="100"/>
  <g transform="translate(50, 50)">
    <!-- Film reel/clapperboard icon -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="currentColor" stroke-width="2" opacity="0.3"/>
    <rect x="-25" y="-20" width="50" height="40" fill="none" stroke="currentColor" stroke-width="2.5" rx="3"/>
    <line x1="-25" y1="-20" x2="-15" y2="-10" stroke="currentColor" stroke-width="2.5"/>
    <line x1="-15" y1="-20" x2="-5" y2="-10" stroke="currentColor" stroke-width="2.5"/>
    <line x1="-5" y1="-20" x2="5" y2="-10" stroke="currentColor" stroke-width="2.5"/>
    <line x1="5" y1="-20" x2="15" y2="-10" stroke="currentColor" stroke-width="2.5"/>
    <line x1="15" y1="-20" x2="25" y2="-10" stroke="currentColor" stroke-width="2.5"/>
  </g>
</svg>
