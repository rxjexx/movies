    <style>
        @keyframes animationIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0px);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOutDown {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(40px);
            }
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeOutScale {
            0% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
            100% {
                opacity: 0;
                transform: scale(0.95) translateY(30px);
            }
        }

        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-50px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOutLeft {
            0% {
                opacity: 1;
                transform: translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50px);
            }
        }

        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(50px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOutRight {
            0% {
                opacity: 1;
                transform: translateX(0);
            }
            100% {
                opacity: 0;
                transform: translateX(50px);
            }
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.15), inset 0 -1px 1px rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
        }

        .glass-highlight {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0.05) 100%);
            border-radius: 1.5rem;
            z-index: 10;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.5);
            border-right-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .player-loading.hidden {
            display: none;
        }

        [animation:animationIn_0.8s_ease-out_0.1s_both] {
            animation: animationIn 0.8s ease-out 0.1s both;
        }

        /* Scroll animations removed - using only load animations for smooth scrolling */
        .animate-on-scroll { animation: none !important; }
        .scroll-fade-in { animation: none !important; opacity: 1 !important; }
        .scroll-scale-in { animation: none !important; opacity: 1 !important; transform: scale(1) !important; }
        .scroll-slide-left { animation: none !important; opacity: 1 !important; transform: none !important; }
        .scroll-slide-right { animation: none !important; opacity: 1 !important; transform: none !important; }
        .scroll-section { animation: none !important; opacity: 1 !important; transform: none !important; }

        /* ========================
           UNIFIED BUTTON STYLES
           ======================== */

        .btn-standard {
            @apply px-4 py-3 rounded-lg font-semibold text-sm tracking-tight transition-all duration-300 ease-out cursor-pointer inline-flex items-center justify-center gap-2 relative overflow-hidden;
        }

        .btn-primary {
            @apply bg-gradient-to-br from-zinc-800 to-zinc-900 border border-zinc-700/50 text-zinc-300 hover:text-white hover:bg-gradient-to-br hover:from-zinc-700 hover:to-zinc-800 hover:-translate-y-1 hover:shadow-lg;
        }

        .btn-secondary {
            @apply bg-transparent border-2 border-zinc-600 text-zinc-300 hover:text-white hover:bg-zinc-900/50 hover:border-zinc-500 hover:-translate-y-1 hover:shadow-lg;
        }

        .btn-accent {
            @apply bg-gradient-to-br from-yellow-500 to-yellow-600 text-black font-bold hover:from-yellow-400 hover:to-yellow-500 hover:-translate-y-1 hover:shadow-lg hover:shadow-yellow-500/50;
        }

        .btn-icon {
            @apply w-4 h-4 flex items-center justify-center;
        }

        .btn:disabled {
            @apply opacity-50 cursor-not-allowed;
        }

        /* Video Player Interactivity */
        #videoPlayer {
            pointer-events: auto !important;
            z-index: 10;
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
        }

        .player-loading {

        .glass-card {

        }

        main {
            pointer-events: auto !important;
        }

        .flex.flex-col.gap-12 {
            pointer-events: auto !important;
        }
    </style>
    <script>
        (function () {
            const style = document.createElement("style");
            style.textContent = `.animate-on-scroll { animation-play-state: paused !important; } .animate-on-scroll.animate { animation-play-state: running !important; }`;
            document.head.appendChild(style);
            const once = true;
            if (!window.__inViewIO) {
                window.__inViewIO = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add("animate");
                            if (once) window.__inViewIO.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.2, rootMargin: "0px 0px -10% 0px" });
            }
            window.initInViewAnimations = function (selector = ".animate-on-scroll") {
                document.querySelectorAll(selector).forEach((el) => {
                    window.__inViewIO.observe(el);
                });
            };
            document.addEventListener("DOMContentLoaded", () => {
                initInViewAnimations();
                lucide.createIcons();
            });
        })();
    </script>

<script>
    const API_BASE_URL = 'https://api.themoviedb.org/3';
    const TMDB_API_KEY = '9f3a94034c696a33133c40385d030817';

    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const movieId = params.get('id');
    const mediaType = params.get('type');
    const title = params.get('title');

    console.log('Watch Page initialized - ID:', movieId, 'Type:', mediaType, 'Title:', title);

    // Validate required parameters
    if (!movieId) {
        document.getElementById('serverStatus').textContent = 'Error: No movie ID provided';
        document.getElementById('loadingSubtext').textContent = 'Please go back and select a movie';
        console.error('No movie ID in URL parameters');
    }

    // Get DOM elements
    const serverButtons = document.getElementById('serverButtons');
    const playerLoading = document.getElementById('playerLoading');
    const serverStatus = document.getElementById('serverStatus');
    const loadingSubtext = document.getElementById('loadingSubtext');
    const videoPlayer = document.getElementById('videoPlayer');

    let currentStreams = [];

    // Fetch streams from backend with retry logic
    async function fetchStreams() {
        try {
            console.log('Fetching streams for:', mediaType, 'ID:', movieId);
            
            // Build URLs based on media type
            const urlPath = mediaType === 'show' ? 'tv' : 'movie';
            
            // Build streaming server URLs directly - no backend needed
            const streams = [
                {
                    name: 'VidSrc.mov',
                    url: `https://vidsrc.mov/embed/${urlPath}/${movieId}`,
                    type: 'iframe',
                    quality: '1080p',
                    status: 'Primary - 100% Reliable'
                },
                {
                    name: 'VidSrc.pro',
                    url: `https://vidsrc.pro/embed/${urlPath}/${movieId}`,
                    type: 'iframe',
                    quality: '1080p/4K',
                    status: 'Ultra Reliable'
                },
                {
                    name: 'MultiEmbed',
                    url: `https://multiembed.mov/embed/${urlPath}/${movieId}`,
                    type: 'iframe',
                    quality: '1080p',
                    status: 'Fast Loading'
                },
                {
                    name: 'DbGo',
                    url: `https://dbgo.fun/embed/${urlPath}/${movieId}`,
                    type: 'iframe',
                    quality: '720p-1080p',
                    status: 'Stable Streaming'
                },
                {
                    name: 'AutoEmbed',
                    url: mediaType === 'show' 
                        ? `https://autoembed.co/tv/id/${movieId}`
                        : `https://autoembed.co/movie/id/${movieId}`,
                    type: 'iframe',
                    quality: '720p-1080p',
                    status: 'Auto-Sourced - Fast'
                },
                {
                    name: 'VidSrc.lol',
                    url: `https://vidsrc.lol/embed/${urlPath}/${movieId}`,
                    type: 'iframe',
                    quality: '1080p/4K',
                    status: 'Backup - Reliable'
                },
                {
                    name: 'Embed.su',
                    url: `https://embed.su/embed/${urlPath}/${movieId}`,
                    type: 'iframe',
                    quality: '720p-1080p',
                    status: 'Dependable'
                },
                {
                    name: 'FlixHQ',
                    url: `https://flixhq.top/embed/${urlPath}/${movieId}`,
                    type: 'iframe',
                    quality: '1080p',
                    status: 'Quality Streaming'
                },
                {
                    name: 'HiAnime',
                    url: `https://hianime.to/embed/${urlPath}/${movieId}`,
                    type: 'iframe',
                    quality: '720p-1080p',
                    status: 'High Speed'
                },
                {
                    name: 'Moonstream',
                    url: `https://moonstream.to/embed/${urlPath}/${movieId}`,
                    type: 'iframe',
                    quality: '1080p',
                    status: 'Smooth Playback'
                }
            ];
            
            currentStreams = streams;
            console.log('Loaded', currentStreams.length, 'streams');
            initializeServers();
        } catch (error) {
            console.error('Error setting up streams:', error);
            showErrorMessage('Error setting up streaming servers.');
        }
    }

    // Initialize server buttons
    function initializeServers() {
        console.log('Initializing', currentStreams.length, 'servers');
        serverButtons.innerHTML = '';
        
        if (!currentStreams || currentStreams.length === 0) {
            showErrorMessage('No streaming servers available');
            return;
        }
        
        currentStreams.forEach((stream, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-standard btn-primary group relative inline-flex cursor-pointer transition-all duration-500 ease-out hover:-translate-y-1 font-normal text-sm tracking-tight bg-gradient-to-br from-zinc-800 to-zinc-900 border border-zinc-700/50 rounded-lg px-4 py-3 items-center justify-center gap-2 text-zinc-300 hover:text-white hover:bg-gradient-to-br hover:from-zinc-700 hover:to-zinc-800 overflow-hidden';
            btn.innerHTML = `
                <span class="flex items-center gap-2">
                    <iconify-icon icon="solar:server-linear" class="w-4 h-4" style="stroke-width: 1.5;"></iconify-icon>
                    <span>${stream.name}</span>
                    <span class="text-xs opacity-60 font-normal">${stream.quality}</span>
                </span>
            `;
            btn.title = stream.status;
            btn.onclick = () => selectServer(stream, btn, index);
            serverButtons.appendChild(btn);
            console.log('Added server button:', stream.name);
        });

        // Select first server by default
        if (currentStreams.length > 0) {
            const firstBtn = serverButtons.querySelector('button');
            if (firstBtn) {
                console.log('Selecting first server by default');
                selectServer(currentStreams[0], firstBtn, 0);
            }
        }
    }

    // Select and load a server
    function selectServer(stream, buttonElement, index) {
        console.log('Selecting server:', stream.name, 'URL:', stream.url);
        
        // Show loading indicator
        playerLoading.classList.remove('hidden');
        serverStatus.textContent = `Connecting to ${stream.name}...`;
        loadingSubtext.textContent = `${stream.status} • ${stream.quality} Quality`;

        // Update button states
        document.querySelectorAll('#serverButtons button').forEach(btn => {
            btn.classList.remove('ring-2', 'ring-yellow-500');
        });
        buttonElement.classList.add('ring-2', 'ring-yellow-500');

        // Load the stream
        setTimeout(() => {
            if (stream.type === 'iframe') {
                loadIframeStream(stream.url, stream.name);
            }
        }, 500);
    }

    // Load iframe stream - basic embed
    function loadIframeStream(url, serverName) {
        serverStatus.textContent = `Loading from ${serverName}...`;
        
        const videoPlayer = document.getElementById('videoPlayer');
        
        // Simply set the src - no complex handling
        videoPlayer.src = url;
        
        // Hide loading after a short delay
        setTimeout(() => {
            playerLoading.classList.add('hidden');
            serverStatus.textContent = 'Stream Ready';
        }, 2000);
    }

    // Track current server index
    let currentServerIndex = 0;

    // Try next server
    function tryNextServer() {
        currentServerIndex++;
        
        if (currentServerIndex < currentStreams.length) {
            console.log('Trying server index:', currentServerIndex);
            const nextStream = currentStreams[currentServerIndex];
            const nextBtn = document.querySelectorAll('#serverButtons button')[currentServerIndex];
            
            if (nextBtn) {
                console.log('Automatically selecting next server:', nextStream.name);
                selectServer(nextStream, nextBtn, currentServerIndex);
            }
        } else {
            console.error('All servers exhausted');
            serverStatus.textContent = 'All servers failed';
            loadingSubtext.textContent = 'No working servers available. Please try again later.';
            playerLoading.classList.add('hidden');
        }
    }

    // Show error message
    function showErrorMessage(message) {
        console.error('Error message:', message);
        const errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'color: #f87171; padding: 1rem; text-align: center; font-size: 0.875rem; margin: 0.5rem 0; background: rgba(248, 113, 113, 0.1); border: 1px solid #f87171; border-radius: 0.5rem;';
        errorDiv.textContent = message;
        serverButtons.appendChild(errorDiv);
        
        // Also update status
        serverStatus.textContent = 'Server Issue';
        loadingSubtext.textContent = message;
    }

    // Detect if page is being redirected
    window.addEventListener('unload', function() {
        console.log('Page unloading - watch page is closing');
    });

    // Monitor for redirect attempts
    if (window.top !== window.self) {
        console.log('Watch page is in an iframe (this is expected if coming from another page)');
    }

    // Protect against iframe redirects by monitoring navigation
    let isNavigatingAway = false;

    console.log('Watch page ready');
    try {
        document.getElementById('watchTitle').textContent = decodeURIComponent(title) || 'Unknown Title';
        document.getElementById('watchType').textContent = mediaType === 'show' ? 'TV Series' : 'Movie';
        document.getElementById('watchYear').textContent = new Date().getFullYear();
        document.getElementById('watchRating').textContent = '★★★★★ 8.5/10';
        document.getElementById('watchOverview').textContent = 'Select a server below to start streaming. All servers support high quality video with minimal lag.';
    } catch (error) {
        console.error('Error populating page:', error);
    }

    // Initialize on page load - handle both cases (DOM loaded or loading)
    function initializeWatch() {
        console.log('Initializing watch page - ID:', movieId);
        
        if (movieId) {
            // Fetch streams immediately
            fetchStreams();
        } else {
            document.getElementById('serverStatus').textContent = 'Error: No movie selected';
        }
        
        // Save to recently watched
        if (movieId && mediaType && title) {
            try {
                lumiereStorage.addToRecentlyWatched({
                    id: movieId,
                    title: decodeURIComponent(title),
                    type: mediaType,
                    poster_path: null
                });
                console.log('Added to recently watched:', movieId);
            } catch (error) {
                console.error('Error saving to recently watched:', error);
            }
        }
    }

    // Initialize watch based on document readyState
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeWatch);
    } else {
        // DOM is already loaded
        initializeWatch();
    }
    
    // Initialize remote listener
    initializeRemoteListener();

    // ========================
    // REMOTE CONTROL HANDLER
    // ========================
    
    let playerState = {
        isPlaying: false,
        currentTime: 0,
        duration: 0,
        volume: 1,
        brightness: 100
    };

    // Listen for remote commands from remote.html
    function initializeRemoteListener() {
        console.log('%c🎮 Remote Control System Initialized', 'font-size: 12px; color: #60a5fa; background: rgba(96, 165, 250, 0.1); padding: 4px 8px; border-radius: 3px;');
        console.log('📡 Listening for commands from remote.html...');
        console.log('💡 Tip: Open the remote in a separate window to start controlling');
        
        // Listen for storage changes (from remote.html in different window)
        window.addEventListener('storage', function(e) {
            if (e.key === 'lumiereRemoteCommand') {
                try {
                    const command = JSON.parse(e.newValue);
                    handleRemoteCommand(command);
                } catch (error) {
                    console.error('Error parsing remote command:', error);
                }
            }
        });
        
        // Also listen for local events (same window/tab)
        window.addEventListener('lumiere:remote', function(e) {
            handleRemoteCommand(e.detail);
        });
        
        console.log('✅ Remote listener initialized - ready to receive commands');
    }

    // Handle incoming remote commands
    function handleRemoteCommand(payload) {
        const { command, data } = payload;
        console.log('📡 Remote command received:', command, data);
        
        const videoFrame = document.getElementById('videoPlayer');
        
        switch(command) {
            case 'playback':
                handlePlaybackControl(data.action, videoFrame);
                break;
                
            case 'seek':
                handleSeek(data.amount, videoFrame);
                break;
                
            case 'navigate':
                handleNavigation(data.direction);
                break;
                
            case 'select':
                handleSelect();
                break;
                
            case 'volume':
                handleVolume(data.level);
                break;
                
            case 'brightness':
                handleBrightness(data.level);
                break;
                
            default:
                console.log('Unknown command:', command);
        }
    }

    // Play/Pause control
    function handlePlaybackControl(action, videoFrame) {
        console.log('▶️ Playback:', action);
        
        try {
            // Try to send message to iframe (some servers support this)
            if (videoFrame && videoFrame.contentWindow) {
                if (action === 'play') {
                    videoFrame.contentWindow.postMessage({ action: 'play' }, '*');
                } else if (action === 'pause') {
                    videoFrame.contentWindow.postMessage({ action: 'pause' }, '*');
                }
            }
        } catch (error) {
            console.log('Note: Cannot directly control iframe player (cross-origin)', error);
        }
        
        // Show visual feedback
        showRemoteFeedback(action === 'play' ? '▶ Playing' : '⏸ Paused');
    }

    // Seek control (skip forward/backward)
    function handleSeek(amount, videoFrame) {
        console.log(`⏭️ Seek: ${amount}s`);
        
        try {
            // Try to send seek message to iframe
            if (videoFrame && videoFrame.contentWindow) {
                videoFrame.contentWindow.postMessage({ action: 'seek', amount: amount }, '*');
            }
        } catch (error) {
            console.log('Note: Cannot directly seek iframe player (cross-origin)', error);
        }
        
        // Show visual feedback
        const label = amount > 0 ? `⏩ +${amount}s` : `⏪ ${amount}s`;
        showRemoteFeedback(label);
    }

    // Navigation (directional buttons)
    function handleNavigation(direction) {
        console.log('🎮 Navigate:', direction);
        
        try {
            const videoFrame = document.getElementById('videoPlayer');
            if (videoFrame && videoFrame.contentWindow) {
                videoFrame.contentWindow.postMessage({ action: 'navigate', direction: direction }, '*');
            }
        } catch (error) {
            console.log('Note: Cannot send navigation to iframe (cross-origin)', error);
        }
        
        const icons = {
            'up': '↑ Up',
            'down': '↓ Down',
            'left': '← Left',
            'right': '→ Right'
        };
        
        showRemoteFeedback(icons[direction] || direction);
    }

    // Select button
    function handleSelect() {
        console.log('✓ Select');
        showRemoteFeedback('✓ Select');
        
        try {
            const videoFrame = document.getElementById('videoPlayer');
            if (videoFrame && videoFrame.contentWindow) {
                videoFrame.contentWindow.postMessage({ action: 'select' }, '*');
            }
        } catch (error) {
            console.log('Note: Cannot send select to iframe (cross-origin)', error);
        }
    }

    // Volume control
    function handleVolume(level) {
        console.log(`🔊 Volume: ${level}%`);
        playerState.volume = level / 100;
        
        // Apply volume to page if there's any audio element
        document.querySelectorAll('audio, video').forEach(el => {
            el.volume = playerState.volume;
        });
        
        showRemoteFeedback(`🔊 Volume: ${level}%`);
    }

    // Brightness control
    function handleBrightness(level) {
        console.log(`💡 Brightness: ${level}%`);
        playerState.brightness = level;
        
        // Apply brightness filter to player container
        const playerSection = document.querySelector('.glass-card');
        if (playerSection) {
            playerSection.style.filter = `brightness(${level / 100})`;
        }
        
        showRemoteFeedback(`💡 Brightness: ${level}%`);
    }

    // Show temporary feedback on screen
    function showRemoteFeedback(message) {
        // Remove existing feedback
        const existing = document.getElementById('remoteFeedback');
        if (existing) {
            existing.remove();
        }
        
        // Create feedback element
        const feedback = document.createElement('div');
        feedback.id = 'remoteFeedback';
        feedback.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            z-index: 1000;
            pointer-events: none;
            animation: fadeInOut 0.8s ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        `;
        feedback.textContent = message;
        
        document.body.appendChild(feedback);
        
        // Remove after animation
        setTimeout(() => {
            feedback.remove();
        }, 800);
    }

    // Add animation keyframes
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>


<script>
    // Initialize remote listener when page loads
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeRemoteListener);
    } else {
        initializeRemoteListener();
    }
</script>
